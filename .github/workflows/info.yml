on:
  workflow_dispatch:
  # Run CI once per day (at 06:00 UTC)
  # This ensures that even if there haven't been commits that we are still
  # testing against latest version version
  schedule:
    - cron: '0 6 * * *'


jobs:
  ansible_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install Ansible
        run: |
          python -m pip install ansible

      - name: Run Ansible Playbook
        env:
          INTERSIGHT_API_KEY_ID: ${{ secrets.INTERSIGHT_API_KEY_ID }}
          INTERSIGHT_API_PRIVATE_KEY: ${{ secrets.INTERSIGHT_API_PRIVATE_KEY }}
          ANSIBLE_API_KEY: ${{ secrets.ANSIBLE_API_KEY }}
        run: |
          cd playbooks
          ansible-playbook -i 'localhost,' --connection=local -e "ansible_api_key=${ANSIBLE_API_KEY}" count_vms.yml -vvv
